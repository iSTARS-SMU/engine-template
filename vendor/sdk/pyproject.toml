[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "trustchain-sdk"
version = "0.1.0"
description = "Python SDK for TrustChain Pentest engines."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Proprietary" }
authors = [{ name = "TrustChain Pentest Core" }]

dependencies = [
    "trustchain-contracts>=0.1,<0.2",
    "pydantic>=2.5,<3.0",
    "fastapi>=0.110,<1.0",
    "httpx>=0.27,<1.0",
    "typer>=0.12,<1.0",
    "pyyaml>=6.0,<7.0",
    # DevHarness's /api/v1/tools/_artifact/put route uses Starlette's
    # request.form() to parse multipart uploads; Starlette only loads its
    # multipart parser if python-multipart is installed. Without it, every
    # ctx.save_artifact() call from an engine via DevHarness 500s with an
    # unhelpful AssertionError.
    "python-multipart>=0.0.9",
]

[project.optional-dependencies]
server = [
    # Needed when running engine as a service (not needed for MockContext / unit tests)
    "uvicorn[standard]>=0.29,<1.0",
]
openai = [
    # LLMClient uses this when provider="openai"
    "openai>=1.0,<2.0",
]
dev = [
    "pytest>=7.4",
    "pytest-asyncio>=0.23",
    "ruff>=0.1",
    "black>=24.0",
    "mypy>=1.8",
]

[project.scripts]
trustchain-sdk = "trustchain_sdk.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["trustchain_sdk"]

# ---- Tooling ----
[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.mypy]
python_version = "3.11"
strict = true
